server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Used by Nagios (check_http) and Docker HEALTHCHECK
    location /healthz {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # Used by Graphite/collectd/statsd exporters to pull connection metrics
    location /nginx_status {
        stub_status on;
        access_log off;
        allow all;
    }
}
