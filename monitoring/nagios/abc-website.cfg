# /usr/local/nagios/etc/objects/abc-website.cfg
# Nagios configuration to monitor the ABC Technologies website host and HTTP service.

define host {
    use                     linux-server
    host_name               abc-website-host
    alias                   ABC Website Server (K8s Node)
    address                 <NODE_IP>          ; e.g. 192.168.49.2 for Minikube, or server public IP
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP - Website Availability
    check_command           check_http!-p 30080 -u /healthz -e "200 OK"
    max_check_attempts      4
    check_interval          2
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
    max_check_attempts      4
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

# Notes for the report:
# - check_http hits the /healthz endpoint added in nginx.conf, expecting HTTP 200 "OK".
# - Replace <NODE_IP> with the Minikube/Kubernetes node IP (`minikube ip`) or your VM/host IP.
# - Verify config before restart: /usr/local/nagios/bin/nagios -v /usr/local/nagios/etc/nagios.cfg
# - Restart Nagios: sudo systemctl restart nagios
# - Screenshot the Nagios web UI (Host: abc-website-host = UP, Services = OK) for the report.
