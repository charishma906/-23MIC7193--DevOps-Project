define host {
    use                     linux-server
    host_name               abc-website-host
    alias                   ABC Website (Docker Container)
    address                 host.docker.internal
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               abc-website-host
    service_description     HTTP - Website Availability
    check_command           check_http!-p 8080 -u /healthz -e "200 OK"
    max_check_attempts      4
    check_interval          2
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
